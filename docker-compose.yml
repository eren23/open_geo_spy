name: open-geo-spy

services:
  api:
    build: .
    container_name: open-geo-spy-api
    volumes:
      - ./src:/app/src:ro
      - ./images:/app/images
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - "**/__pycache__"
            - "**/*.pyc"

  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
    container_name: open-geo-spy-frontend
    volumes:
      - ./fe:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api
