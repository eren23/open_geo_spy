# Stage 2: evolve FEATURE_EXTRACTION_PROMPT
targets:
  - type: slice
    path: src/extraction/features.py
    name: feature_extraction_prompt
    locator:
      type: python_assignment
      name: FEATURE_EXTRACTION_PROMPT

trace_sources:
  - type: none

task_sources:
  - type: inline
    tasks:
      - description: "Improve visual feature extraction for street-level location finding"
        files:
          - src/extraction/features.py

evaluator:
  type: command
  command: "./.venv/bin/python scripts/gepa_eval_command.py --candidate {candidate} --target feature_extraction"
  timeout_s: 600
  fail_score: 0.0

reflection_model: "openrouter/z-ai/glm-5.1"
